<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>ADD GENRE</title>
    <style>
        body { padding: 40px; background-color: #ffffff; font-family: 'Helvetica Neue', sans-serif;}
        .form-container { max-width: 500px; margin: 0 auto; border: 1px solid #000; background: #fff; padding: 30px; text-align: center; }
        h1 { text-transform: uppercase; letter-spacing: 1px; margin-bottom: 30px; } 
        p { text-align: left; margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; font-weight: bold; text-transform: uppercase; font-size: 20px; }
        input[type="text"] { width: 100%; padding: 10px; border: 1px solid #000; box-sizing: border-box; font-family: inherit; }  
        input:hover{background-color: #d6d6d6;}   
        .btn-submit { background: #000; color: #fff; border: 1px solid #000; padding: 10px 20px; cursor: pointer; margin-top: 20px; font-size: 12px;}
        .btn-submit:hover { background: #fff; color: #000; }
        .cancel-link { display: block; margin-top: 20px; color: #000; text-decoration: none; font-size: 15px; }
        .cancel-link:hover { color:red}
    </style>
</head>
<body>

<div class="form-container">
    <h1>ADD NEW GENRE</h1>
    
    <form method="post">
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit" class="btn-submit">ADD GENRE</button>
    </form>
    
    <a href="{% url 'curator_dashboard' %}" class="cancel-link">CANCEL</a>
</div>

</body>
</html>
